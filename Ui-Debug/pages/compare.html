<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare — Hermes Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-black text-gray-300 font-sans text-sm antialiased">

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-44 shrink-0 border-r border-gray-800 flex flex-col">
    <div class="px-4 py-4 border-b border-gray-800">
      <span class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Debug</span>
    </div>
    <nav class="flex-1 px-2 py-2 space-y-0.5">
      <a href="trajectories.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-900 transition-colors">
        <span>⚡</span> Trajectories
      </a>
      <a href="sessions.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-900 transition-colors">
        <span>💬</span> Sessions
      </a>
      <a href="compare.html" class="nav-active flex items-center gap-2 px-3 py-2 rounded-lg text-sm">
        <span>⚖️</span> Compare
      </a>
    </nav>
    <div class="px-4 py-3 border-t border-gray-800">
      <span class="text-[10px] text-gray-700">hermes debug ui</span>
    </div>
  </aside>

  <!-- Main: 3 columns -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Column 1: Session list -->
    <div class="w-52 shrink-0 border-r border-gray-800 overflow-y-auto">
      <div class="px-3 py-2 border-b border-gray-800">
        <span class="text-[10px] text-gray-600 uppercase tracking-widest">Sessions</span>
      </div>
      <div id="session-list"></div>
    </div>

    <!-- Column 2: Session messages -->
    <div id="session-panel" class="flex-1 flex flex-col overflow-hidden border-r border-gray-800">
      <div class="flex items-center justify-center h-full">
        <p class="text-xs text-gray-700">Select a session</p>
      </div>
    </div>

    <!-- Column 3: Matching trajectory -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="px-3 py-2 border-b border-gray-800 shrink-0">
        <span class="text-[10px] text-gray-600 uppercase tracking-widest">Trajectory — Agent's View</span>
      </div>
      <div id="traj-panel" class="flex-1 flex flex-col overflow-hidden">
        <div class="flex items-center justify-center h-full">
          <p class="text-xs text-gray-700">Select a session to compare</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="../js/compare.js"></script>
</body>
</html>
