<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trajectories — Hermes Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-black text-gray-300 font-sans text-sm antialiased">

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-44 shrink-0 border-r border-gray-800 flex flex-col">
    <div class="px-4 py-4 border-b border-gray-800">
      <span class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Debug</span>
    </div>
    <nav class="flex-1 px-2 py-2 space-y-0.5">
      <a href="trajectories.html" class="nav-active flex items-center gap-2 px-3 py-2 rounded-lg text-sm">
        <span>⚡</span> Trajectories
      </a>
      <a href="sessions.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-900 transition-colors">
        <span>💬</span> Sessions
      </a>
      <a href="compare.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-900 transition-colors">
        <span>⚖️</span> Compare
      </a>
    </nav>
    <div class="px-4 py-3 border-t border-gray-800">
      <span class="text-[10px] text-gray-700">hermes debug ui</span>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Status bar -->
    <div id="status-bar" class="flex items-center gap-4 px-4 py-2 border-b border-gray-800 text-[11px] text-gray-500 shrink-0">
      <span class="text-gray-700">Loading...</span>
    </div>

    <!-- Content: list + detail -->
    <div class="flex flex-1 overflow-hidden">

      <!-- List -->
      <div class="w-64 shrink-0 border-r border-gray-800 overflow-y-auto">
        <div id="traj-list"></div>
      </div>

      <!-- Detail -->
      <div id="traj-detail" class="flex-1 flex flex-col overflow-hidden">
        <div class="flex items-center justify-center h-full">
          <p class="text-xs text-gray-700">Select a trajectory</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../js/trajectories.js"></script>
</body>
</html>
