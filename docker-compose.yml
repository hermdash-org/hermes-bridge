# HemUI — Docker Compose
#
# Usage:
#   docker compose up -d
#
# That's it. Hermes + Bridge + Auto-updates.

services:
  hermes-dashboard:
    image: kdevss/hermes-dashboard:latest
    container_name: hermes-dashboard
    restart: always
    ports:
      - "8420:8420"
    volumes:
      - "${HOME}/.hermes:/opt/data"         # Config, sessions, API keys (persists)
      - "${HOME}:/opt/data/user-home"       # Access to user's files
    environment:
      - HERMES_HOME=/opt/data

  # Auto-updater: checks Docker Hub every 5 min, pulls + restarts if new image
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 300 hermes-dashboard
    # --cleanup: remove old images after update
    # --interval 300: check every 5 minutes
    # hermes-dashboard: only watch this container (not all)
