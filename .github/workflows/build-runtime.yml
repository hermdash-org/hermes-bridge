name: Build Runtime

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output: hermes-runtime
            name: linux
          - os: windows-latest
            output: hermes-runtime.exe
            name: windows.exe
          - os: macos-latest
            output: hermes-runtime
            name: mac

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Clone hermes-agent
        run: |
          git clone --recurse-submodules https://github.com/NousResearch/hermes-agent.git ../hermes-agent
      
      - name: Inject version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION = \"$VERSION\"" > version.py
          echo "✅ Version set to: $VERSION"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller python-multipart
          pip install -e ../hermes-agent
      
      - name: Build with PyInstaller
        run: |
          pyinstaller runtime.spec
      
      - name: Make Linux binary executable
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x dist/hermes-runtime
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-runtime-${{ matrix.name }}
          path: dist/${{ matrix.output }}
      
      - name: Upload to Cloudflare R2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          pip install boto3
          python upload_to_r2.py "dist/${{ matrix.output }}" "hermes-downloads" "${{ matrix.name }}"
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.output }}
            install.sh
            install.ps1
            install.bat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
