name: Build Runtime

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output: hermes-runtime
            name: linux
          - os: windows-latest
            output: hermes-runtime.exe
            name: windows.exe
          - os: macos-latest
            output: hermes-runtime
            name: mac

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Clone hermes-agent
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            git clone https://github.com/NousResearch/hermes-agent.git ../hermes-agent && break
            echo "Clone attempt $i failed, retrying in 10s..."
            sleep 10
          done
      
      - name: Inject version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION = \"$VERSION\"" > version.py
          echo "[OK] Version set to: $VERSION"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller python-multipart boto3 cython setuptools
          pip install -e ../hermes-agent
      
      - name: Install Higgsfield CLI (Linux/Mac)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/higgsfield-ai/cli/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install Higgsfield CLI (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/higgsfield-ai/cli/main/install.ps1" -OutFile install.ps1
          .\install.ps1
          echo "$env:LOCALAPPDATA\higgsfield\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Compile bridge with Cython
        shell: bash
        run: |
          echo "[*] Compiling bridge Python files to C extensions..."
          # Find all .py files in bridge/ except __init__.py and __main__.py
          find bridge -name "*.py" ! -name "__init__.py" ! -name "__main__.py" | while read f; do
            echo "  Compiling: $f"
            cython "$f" --3str || echo "  [SKIP] $f (cython failed, keeping .py)"
          done
          # Build the generated .c files into .so/.pyd
          python -c "
          from setuptools import setup
          from Cython.Build import cythonize
          import os, glob
          c_files = glob.glob('bridge/**/*.c', recursive=True)
          if c_files:
              setup(ext_modules=cythonize(c_files, language_level='3'), script_args=['build_ext', '--inplace'])
              compiled = 0
              for c in c_files:
                  py = c.replace('.c', '.py')
                  so_pattern = c.replace('.c', '*.so') if os.name != 'nt' else c.replace('.c', '*.pyd')
                  # Only remove .c intermediates — keep .py for PyInstaller import analysis
                  # The runtime.spec strips .py from the final binary (obfuscation preserved)
                  os.remove(c)
                  if glob.glob(so_pattern):
                      compiled += 1
                      print(f'  [OK] {py} -> compiled to .so (source kept for analysis)')
                  else:
                      print(f'  [WARN] {py} -> no extension produced')
              print(f'  Compiled {compiled}/{len(c_files)} modules')
          else:
              print('  No .c files generated, skipping build')
          "
          echo "[*] Compilation complete (.py kept for PyInstaller, stripped from final binary)"

      - name: Build with PyInstaller
        run: |
          pyinstaller runtime.spec
      
      - name: Make Linux binary executable
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x dist/hermes-runtime
          
      - name: Smoke Test Binary
        shell: python
        run: |
          import subprocess
          import time
          import urllib.request
          import sys
          import os
          
          # Platform-specific paths inside GitHub runner
          binary_path = os.path.join("dist", "${{ matrix.output }}")
          print(f"[SMOKE] Starting {binary_path} for smoke test...")
          
          # Start the binary in the background
          proc = subprocess.Popen([binary_path])
          
          # Poll /health for up to 20 seconds
          test_passed = False
          for _ in range(20):
              try:
                  res = urllib.request.urlopen("http://127.0.0.1:8521/health", timeout=1)
                  if res.getcode() == 200:
                      test_passed = True
                      break
              except Exception:
                  pass
              time.sleep(1)
              
          # Cleanup the process
          proc.terminate()
          try:
              proc.wait(timeout=5)
          except subprocess.TimeoutExpired:
              proc.kill()
              
          # Final verdict
          if not test_passed:
              print("\n[FAIL] SMOKE TEST FAILED: Binary crashed or failed to serve /health.")
              print("[FAIL] Upload to R2 BLOCKED.")
              sys.exit(1)
          else:
              print("\n[PASS] SMOKE TEST PASSED: /health responded perfectly.")
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true  # Don't block R2 upload if GitHub storage quota is hit
        with:
          name: hermes-runtime-${{ matrix.name }}
          path: dist/${{ matrix.output }}
      
      - name: Upload binary to Cloudflare R2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python upload_to_r2.py "dist/${{ matrix.output }}" "${{ matrix.name }}"

  # After all platform builds finish, upload version.json with checksums
  publish-version:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true  # May fail due to storage quota
        with:
          path: artifacts/

      - name: Install upload dependencies
        run: pip install boto3

      - name: Download binaries from R2
        if: startsWith(github.ref, 'refs/tags/')  # Only for releases where R2 upload happened
        shell: bash
        run: |
          echo "[INFO] Downloading binaries from R2..."
          
          # Create artifact directories
          mkdir -p artifacts/hermes-runtime-{linux,mac,windows.exe}
          
          # Wait for R2 uploads to complete (build jobs run in parallel)
          echo "[INFO] Waiting 90s for all build jobs to upload to R2..."
          sleep 90
          
          python3 << 'PYEOF'
          import boto3
          import os
          import time
          
          s3 = boto3.client(
              's3',
              endpoint_url=f"https://{os.environ['CF_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          
          # Download each platform binary with retry logic
          downloads = [
              ('linux', 'artifacts/hermes-runtime-linux/hermes-runtime'),
              ('mac', 'artifacts/hermes-runtime-mac/hermes-runtime'),
              ('windows.exe', 'artifacts/hermes-runtime-windows.exe/hermes-runtime.exe'),
          ]
          
          for platform, local_path in downloads:
              max_retries = 3
              for attempt in range(max_retries):
                  try:
                      # Check if file exists in R2 first
                      s3.head_object(Bucket='hermes-downloads', Key=platform)
                      # File exists, download it
                      s3.download_file('hermes-downloads', platform, local_path)
                      print(f"[OK] Downloaded {platform}")
                      break
                  except s3.exceptions.ClientError as e:
                      if e.response['Error']['Code'] == '404':
                          if attempt < max_retries - 1:
                              print(f"[RETRY] {platform} not found yet, waiting 30s... (attempt {attempt + 1}/{max_retries})")
                              time.sleep(30)
                          else:
                              print(f"[ERROR] {platform} not found in R2 after {max_retries} attempts")
                              raise
                      else:
                          print(f"[ERROR] Failed to download {platform}: {e}")
                          raise
                  except Exception as e:
                      print(f"[ERROR] Failed to download {platform}: {e}")
                      raise
          PYEOF
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Generate version.json with checksums
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Calculate SHA256 checksums for each platform binary
          LINUX_SHA256=$(sha256sum artifacts/hermes-runtime-linux/hermes-runtime | cut -d' ' -f1)
          MAC_SHA256=$(sha256sum artifacts/hermes-runtime-mac/hermes-runtime | cut -d' ' -f1)
          WIN_SHA256=$(sha256sum artifacts/hermes-runtime-windows.exe/hermes-runtime.exe | cut -d' ' -f1)

          cat > version.json <<EOF
          {
            "version": "$VERSION",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "checksums": {
              "linux": "$LINUX_SHA256",
              "mac": "$MAC_SHA256",
              "windows.exe": "$WIN_SHA256"
            }
          }
          EOF

          echo "[OK] version.json:"
          cat version.json

      - name: Upload version.json to R2
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python upload_to_r2.py "version.json" "version.json"

      - name: Upload install scripts to R2
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          for script in install.sh install.bat install.ps1; do
            if [ -f "$script" ]; then
              python upload_to_r2.py "$script" "$script"
            else
              echo "[SKIP] $script (not found)"
            fi
          done
